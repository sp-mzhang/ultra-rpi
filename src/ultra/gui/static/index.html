<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">
  <title>Ultra RPi</title>
  <meta http-equiv="Cache-Control"
        content="no-cache, no-store, must-revalidate">
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hammerjs@2/hammer.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2/dist/chartjs-plugin-zoom.min.js"></script>
</head>
<body>
  <header>
    <h1>Ultra RPi
      <span id="machine-name" class="machine-tag">
      </span>
    </h1>
    <div id="mode-indicator" class="badge badge-blue">
      Manual Mode
    </div>
  </header>

  <main>
    <!-- Top row: 3 equal panels, 1/3 screen height -->
    <section id="controls" class="panel">
      <h2>Protocol Control</h2>
      <div class="control-row">
        <label for="recipe-select">Recipe:</label>
        <select id="recipe-select"></select>
      </div>
      <div class="control-row">
        <label for="chip-id">Chip ID:</label>
        <input type="text" id="chip-id"
               placeholder="ULTRA-TEST-001">
      </div>
      <div class="btn-row">
        <button id="btn-run" class="btn btn-green">
          Run
        </button>
        <button id="btn-pause" class="btn btn-yellow"
                disabled>
          Pause
        </button>
        <button id="btn-resume" class="btn btn-blue"
                disabled>
          Resume
        </button>
        <button id="btn-abort" class="btn btn-red"
                disabled>
          Abort
        </button>
        <button id="btn-new-run" class="btn btn-new"
                style="display:none">
          New Run
        </button>
      </div>
      <div class="control-row">
        <button id="btn-sm-start" class="btn btn-sm">
          Start State Machine
        </button>
        <button id="btn-sm-stop" class="btn btn-sm"
                disabled>
          Stop State Machine
        </button>
      </div>
    </section>

    <section id="progress" class="panel">
      <h2>Step Progress</h2>
      <div id="step-info">
        <span id="step-phase" class="phase-badge">--</span>
        <span id="step-label">Idle</span>
        <span id="tip-badge" class="tip-badge">
          Tip: none
        </span>
      </div>
      <div class="progress-bar-outer">
        <div id="progress-bar" class="progress-bar-inner"
             style="width: 0%">
          0 / 0
        </div>
      </div>
      <div id="elapsed">Elapsed: 0.0s</div>
    </section>

    <section id="cartridge-map" class="panel">
      <h2>Cartridge Map</h2>
      <div id="wells-grid"></div>
    </section>

    <!-- Bottom area: tabbed chart card, 2/3 height -->
    <section id="chart-card" class="panel">
      <div id="chart-body">
        <div id="chart-main">
          <div id="chart-header">
            <div class="chart-tabs">
              <button class="tab-btn active"
                      data-tab="spectrum">
                Spectrum
              </button>
              <button class="tab-btn"
                      data-tab="sensorgram">
                Sensorgram
              </button>
            </div>
            <div id="toolbar-spectrum" class="chart-toolbar">
              <button id="sp-freeze" class="chart-btn"
                      title="Freeze: pause live updates">
                Freeze
              </button>
              <button id="sp-reset-zoom" class="chart-btn"
                      title="Reset zoom / pan">
                Reset
              </button>
            </div>
            <div id="toolbar-sensorgram"
                 class="chart-toolbar" hidden>
              <label for="sg-start-x">Start X:</label>
              <input type="number" id="sg-start-x"
                     value="0" step="1" min="0"
                     title="X-axis start (s)">
              <button id="sg-align-y" class="chart-btn"
                      title="Align Y: subtract baseline">
                Align Y
              </button>
              <button id="sg-freeze" class="chart-btn"
                      title="Freeze: pause live updates">
                Freeze
              </button>
              <button id="sg-reset-zoom" class="chart-btn"
                      title="Reset zoom / pan">
                Reset
              </button>
              <button id="sg-clear" class="chart-btn"
                      title="Clear all chart data">
                Clear
              </button>
            </div>
          </div>
          <div class="canvas-wrap">
            <canvas id="spectrum-canvas"></canvas>
            <canvas id="sensorgram-canvas"></canvas>
          </div>
        </div>
        <aside id="channel-sidebar">
          <h3>Toggle Curves</h3>
          <div id="ch-grid"></div>
          <div id="ch-actions">
            <button id="ch-all" class="ch-action-btn">
              All
            </button>
            <button id="ch-none" class="ch-action-btn">
              None
            </button>
          </div>
        </aside>
      </div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
