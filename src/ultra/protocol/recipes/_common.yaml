# Machine-specific defaults (offsets, angles, Z) come from
# S3 machine_settings.yaml / local config ``calibration:``.
defaults:
  move_rpm: 1
  aspirate_speed: 40.0
  well_disp_speed: 100.0
  lld_threshold: 20
  shake_angle_deg: 45
  shake_cycles: 3

centrifuge_phase:
  steps:
    - type: set_loc_offset
      label: Apply gantry offset

    - type: centrifuge_unlock
      label: Unlock cartridge

    - type: centrifuge_shake
      label: Shake carousel

    - type: centrifuge_spin
      label: Spin 500 RPM x 5
      rpm: 500
      duration_s: 5

    - type: centrifuge_goto_pipette
      label: Rotate to pipette position

    # Open the lid before the camera fires so the toolhead
    # camera has an unobstructed view of the carousel labels.
    - type: lid
      label: Open lid
      open: true

    # Camera-refine the landing at whichever station the
    # previous goto reached (here: pipette). The step itself
    # does NOT command a goto -- it auto-detects the visible
    # side from the decoded marker payloads, anchors to that
    # side's absolute station angle, and applies the camera-
    # measured correction. Idempotent: re-running cannot
    # accumulate drift.
    - type: align_to_carousel
      label: Camera-align carousel

    - type: lift_move
      label: Lower lift to 15mm
      target_mm: 15.0

    - type: centrifuge_goto_pipette
      label: Rotate to pipette position

lock_phase:
  steps:
    - type: centrifuge_lock
      label: Lock cartridge

    - type: home_all
      label: Home all (final)
