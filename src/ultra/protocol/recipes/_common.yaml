# Machine-specific defaults (offsets, angles, Z) come from
# S3 machine_settings.yaml / local config ``calibration:``.
defaults:
  move_rpm: 1
  aspirate_speed: 40.0
  well_disp_speed: 100.0
  lld_threshold: 20
  shake_angle_deg: 45
  shake_cycles: 3

centrifuge_phase:
  steps:
    - type: set_loc_offset
      label: Apply gantry offset

    - type: centrifuge_unlock
      label: Unlock cartridge

    - type: centrifuge_shake
      label: Shake carousel

    - type: centrifuge_spin
      label: Spin 500 RPM x 5s
      rpm: 500
      duration_s: 360

    - type: centrifuge_rotate
      label: Rotate 290 deg
      angle_001deg: 29000

    - type: centrifuge_goto_blister
      label: Rotate to blister position

    - type: lift_move
      label: Lower lift to 15mm
      target_mm: 15.0

    - type: centrifuge_goto_pipette
      label: Rotate to pipette position

lock_phase:
  # Explicit lock sequence (mirrors what firmware's packed
  # centrifuge_lock payload defaults would have done):
  #   1. raise lift to mid height (28.0 mm) under cartridge
  #   2. rotate carousel to the locking angle (80 deg)
  #      -- auto-derived as angle_open_initial_deg (290)
  #         minus 210 in pack_centrifuge_sequence()
  #   3. raise lift to high height (38.0 mm) to press collar
  #   4. actuate the lock (rotate the lock dog)
  #   5. home everything
  steps:
    - type: lift_move
      label: Raise lift to 28 mm (pre-lock)
      target_mm: 28.0

    - type: centrifuge_rotate
      label: Rotate to locking angle (80 deg)
      angle_001deg: 8000

    - type: lift_move
      label: Raise lift to 38 mm (engage collar)
      target_mm: 38.0

    - type: centrifuge_lock
      label: Rotate lock actuator

    - type: home_all
      label: Home all (final)
