defaults:
  angle_open_initial_deg: 290
  move_rpm: 1
  aspirate_speed: 40.0
  well_disp_speed: 100.0
  lld_threshold: 20
  default_cartridge_z_mm: -23.8
  shake_angle_deg: 45
  shake_cycles: 3

centrifuge_phase:
  steps:
    - type: centrifuge_unlock
      label: Unlock cartridge

    - type: centrifuge_spin
      label: Spin 500 RPM x 5s
      rpm: 500
      duration_s: 5

    - type: centrifuge_rotate
      label: Rotate 290 deg
      angle_001deg: 29000

    - type: lift_move
      label: Lower lift to 15mm
      target_mm: 15.0

    - type: centrifuge_shake
      label: Shake carousel

    - type: centrifuge_goto_pipette
      label: Rotate to pipette position

lock_phase:
  steps:
    - type: centrifuge_lock
      label: Lock cartridge

    - type: home_all
      label: Home all (final)
