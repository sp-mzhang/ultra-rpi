name: CRP Ultra Demo
description: >
  Shortened demo variant of the CRP Ultra protocol.
  Runs the centrifuge phase, picks 50 uL serum from the
  tube via centrifuge rotation using the same aspirate
  parameters as crp_ultra.yaml (speed 75, air_slug 50),
  dispenses all 50 uL into M4, tip-mixes M4 with the
  same speed/cycles as crp_ultra (speed 100, cycles 4),
  cart-dispenses 20 uL from M4 to PP4, triggers analysis,
  then runs the lock phase.  No buffer dilutions, no
  multi-reagent cart pass, no GNP back-and-forth.

reader:
  acq_mode: continuous
  acq_time_total_s: 20000
  acq_time_step_s: 4

peak_detect:
  fit_type: detect_peaks
  stitch_th: 1.15
  config_fit:
    dist: 100
    ignore_start: 400
    min_power: -45
    prom: 1.5

constants:
  air_slug_ul: 50
  reasp_ul: 8
  cart_disp_vel: 25.0

wells:
  # Serum source (on the centrifuge carousel).  50 uL
  # aspirated + ~30 uL LLD headroom.
  SERUM: {loc: 18, reagent: Serum, volume_ul: 80}

  # Mixing well (starts empty; receives 30 uL serum).
  M4: {loc: 36, reagent: Serum Mix, volume_ul: 0}

  # Cartridge target.
  PP4: {loc: 11, reagent: Cartridge, volume_ul: 0}

phases:
  - name: A
    label: Centrifuge
    include: _common.yaml#centrifuge_phase

  - name: B
    label: Serum Pickup and Cart Dispense
    steps:
      - type: tip_pick
        label: Pick Tip 1
        tip_id: 1

      - type: lld
        label: Pre-flight LLD
        threshold: 20

      # --- Aspirate serum from the centrifuge tube ---
      # Mirrors crp_ultra.yaml serum pickup parameters
      # (speed 75.0, air_slug 50, piston_reset true).
      - type: move_to_location
        label: Move to serum port
        well: SERUM

      - type: centrifuge_goto_serum
        label: Rotate to serum position

      - type: smart_aspirate
        label: Aspirate serum
        well: SERUM
        volume: 50
        speed: 75.0
        air_slug: 50
        piston_reset: true
        stream: true

      - type: home_z
        label: Home Z after serum aspirate

      - type: centrifuge_goto_pipette
        label: Rotate to pipette position

      # --- Dispense full 50 uL into M4 ---
      # crp_ultra dispenses 20 uL to M4 + 30 uL to a waste
      # well (M2) because M4 already has 180 uL of buffer
      # from its dilution phase.  The demo has no buffer,
      # so all 50 uL go to M4 to leave enough volume for
      # the mix + cart transfer below.  Aspirate speed
      # matches crp_ultra (speed 20.0); blowout is kept
      # true in the demo to fully clear the tip before
      # the mix step (single-tip flow, no tip swap).
      - type: well_dispense
        label: Dispense serum to M4
        well: M4
        volume: 50
        speed: 20.0
        blowout: true

      # --- Tip mix in M4 ---
      # Speed + cycles match crp_ultra (speed 100.0,
      # cycles 4).  mix_vol reduced from 100 -> 40 because
      # M4 holds ~50 uL here vs ~200 uL in crp_ultra.
      - type: tip_mix
        label: Mix M4
        well: M4
        mix_vol: 40
        speed: 100.0
        cycles: 4

      # --- Move from M4 to cartridge (PP4) ---
      # M4 holds ~50 uL post-mix; aspirate 30 uL, dispense
      # 20 uL into the cart, and return the 10 uL + air
      # slug to M4 at the end of the transfer.
      - type: reagent_transfer
        label: cart_dispense_from_M4
        source: M4
        target: PP4
        asp_vol: 50
        cart_vol: 30
        asp_speed: 40.0
        cart_vel: 5
        air_slug: 20
        reasp_ul: 8
        return_speed: 100.0
        stream: true

      - type: timing_marker
        label: Analysis_Trigger_Post_Cart_Dispense
        event_type: start
        trigger_analysis: true

      - type: timing_marker
        label: Analysis_Trigger_Post_Cart_Dispense
        event_type: stop

      - type: tip_return
        label: Return Tip 1
        tip_id: 1

      - type: home_close
        label: Home all + close lid

  - name: C
    label: Lock
    include: _common.yaml#lock_phase
