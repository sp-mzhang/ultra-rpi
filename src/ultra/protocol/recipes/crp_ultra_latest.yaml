name: CRP Ultra Latest
description: >
  HS CRP chip-dispense protocol, mapped to CRP_protocol_32C.csv. Centrifuge phase runs (unlock / rotate / lift /
  pipette-goto) with spin and shake skipped. 6 reagent dispenses on cartridge port A: Hydrophilic, DI water, PBST (120 s
  chip warm wait + 2-stage fast/slow), Sample Buffer #1, Sample (aspirated directly from the serum tube via centrifuge
  rotation), Sample Buffer #2. One tip per reagent, pre-flight LLD, analysis trigger after the final dispense, then
  lock. Air slug 25 uL, aspirate 20 uL/s, chip temp 32 C. Aspirate volumes are CSV + 20 uL on every reagent so the tip
  always carries a 20 uL liquid cushion beyond the cart dispense volume; cart dispense volumes match the CSV exactly and
  the extra 20 uL is returned to the source well at the end of each transfer.
reader:
  acq_mode: continuous
  acq_time_total_s: 20000
  acq_time_step_s: 4
peak_detect:
  fit_type: detect_peaks
  stitch_th: 1.15
  config_fit:
    dist: 100
    ignore_start: 400
    min_power: -45
    prom: 1.5
constants:
  air_slug_ul: 25
  reasp_ul: 12
  cart_disp_vel: 0.5
  skip_centrifuge_spin: true
  skip_centrifuge_shake: true
wells:
  S7:    {loc: 27, reagent: Hydrophilic, volume_ul: 170}
  M3:    {loc: 35, reagent: DI Water, volume_ul: 270}
  M5:    {loc: 37, reagent: PBST, volume_ul: 280}
  SERUM: {loc: 18, reagent: Sample, volume_ul: 150}
  M11:   {loc: 43, reagent: Sample Buffer, volume_ul: 240}
  PP4:   {loc: 11, reagent: Cartridge, volume_ul: 0}

phases:
  - name: A
    label: Centrifuge
    include: _common.yaml#centrifuge_phase
  - name: B
    label: Chip Dispenses
    steps:
      - type: tip_pick
        label: Pick Tip 1
        tip_id: 1
      - type: lld
        label: Pre-flight LLD
        threshold: 15
      - type: reagent_transfer
        label: cart_dispense_Hydrophilic
        source: S7
        target: PP4
        asp_vol: 130
        cart_vol: 70
        asp_speed: 20
        cart_vel: 0.5
        air_slug: 25
        reasp_ul: 12
        return_speed: 16.7
        stream: true
      - type: tip_swap
        label: Tip swap 1 -> 2
        from_id: 1
        to_id: 2
      - type: reagent_transfer
        label: cart_dispense_DI_Water
        source: M3
        target: PP4
        asp_vol: 210
        cart_vol: 160
        asp_speed: 20
        cart_vel: 1.5
        air_slug: 25
        reasp_ul: 12
        return_speed: 16.7
        stream: true
      - type: tip_swap
        label: Tip swap 2 -> 3
        from_id: 2
        to_id: 3
      - type: reagent_transfer
        label: cart_dispense_PBST_fast
        source: M5
        target: PP4
        asp_vol: 220
        cart_vol: 100
        asp_speed: 20
        cart_vel: 3.33
        air_slug: 25
        reasp_ul: 0
        skip_return: true
        hold_at_cart: true
        stream: true
      - type: reagent_transfer
        label: cart_dispense_PBST_slow
        source: M5
        target: PP4
        asp_vol: 0
        cart_vol: 90
        cart_vel: 0.5
        reasp_ul: 10
        return_speed: 33.3
        skip_aspirate: true
        tip_preload_ul: 145
        assume_at_cart: true
        stream: true
      - type: tip_swap
        label: Tip swap 3 -> 4
        from_id: 3
        to_id: 4
      - type: reagent_transfer
        label: cart_dispense_SampleBuffer_1
        source: M11
        target: PP4
        asp_vol: 90
        cart_vol: 60
        asp_speed: 20
        cart_vel: 0.5
        air_slug: 25
        reasp_ul: 0
        return_speed: 33.3
        stream: true
      - type: tip_swap
        label: Tip swap 4 -> 5
        from_id: 4
        to_id: 5
      - type: move_to_location
        label: Move to serum port
        well: SERUM
      - type: centrifuge_goto_serum
        label: Rotate to serum position
      - type: smart_aspirate
        label: Aspirate Sample from serum tube
        well: SERUM
        volume: 90
        speed: 20
        air_slug: 25
        piston_reset: true
        stream: true
      - type: home_z
        label: Home Z after serum aspirate
      - type: centrifuge_goto_pipette
        label: Rotate to pipette position
      - type: reagent_transfer
        label: cart_dispense_Sample
        source: SERUM
        target: PP4
        asp_vol: 0
        cart_vol: 60
        cart_vel: 0.25
        reasp_ul: 0
        skip_aspirate: true
        skip_return: true
        tip_preload_ul: 115
        stream: true
      - type: home_z
        label: Home Z before move-to-serum
      - type: move_to_location
        label: Move to serum port (cushion return)
        well: SERUM
      - type: centrifuge_goto_serum
        label: Rotate back to serum for cushion return
      - type: well_dispense
        label: Return Sample cushion to serum tube
        well: SERUM
        volume: 55
        speed: 33.3
        blowout: true
      - type: home_z
        label: Home Z after serum return
      - type: centrifuge_goto_pipette
        label: Rotate back to pipette position
      - type: tip_swap
        label: Tip swap 5 -> 6
        from_id: 5
        to_id: 6
      - type: reagent_transfer
        label: cart_dispense_SampleBuffer_2
        source: M11
        target: PP4
        asp_vol: 90
        cart_vol: 60
        asp_speed: 20
        cart_vel: 0.5
        air_slug: 25
        reasp_ul: 0
        return_speed: 33.3
        stream: true
      - type: timing_marker
        label: Analysis_Trigger_Post_SampleBuffer2
        event_type: start
        trigger_analysis: true
      - type: timing_marker
        label: Analysis_Trigger_Post_SampleBuffer2
        event_type: stop
      - type: tip_return
        label: Return Tip 6
        tip_id: 6
      - type: home_close
        label: Home all + close lid
  - name: C
    label: Lock
    include: _common.yaml#lock_phase
