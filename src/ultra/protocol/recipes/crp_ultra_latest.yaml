name: CRP Ultra Latest
description: >
  HS CRP chip-dispense protocol with on-deck serial dilution of the patient serum. Centrifuge phase runs
  (unlock / rotate / lift / pipette-goto) with spin and shake skipped. Cartridge port A receives, in order:
  Hydrophilic, PBST (120 s chip warm wait + 2-stage fast/slow), Sample Buffer #1, Diluted Sample, Sample Buffer #2.
  Serum is aspirated directly from the tube via centrifuge rotation (50 uL), then serially diluted: 20 uL into S1
  (180 uL Sample Buffer) -> mix -> 20 uL into S2 (180 uL CRP CWP) -> mix -> cart dispense from S2.  Excess from each
  transfer is either dumped to M12 (waste) or returned to S1.  One tip per reagent (1, 2, 4, 5, 8) with the dilution
  done on the same tip used for the serum pickup.  Pre-flight LLD, analysis trigger fires on the final SampleBuffer #2
  dispense, then lock.  Air slug 25 uL, aspirate 20 uL/s, chip temp 32 C.  Cart dispense volumes match the CSV exactly;
  the 20 uL aspirate cushion on each transfer is returned to the source well at the end.
reader:
  acq_mode: continuous
  acq_time_total_s: 20000
  acq_time_step_s: 4
peak_detect:
  fit_type: detect_peaks
  stitch_th: 1.15
  config_fit:
    dist: 100
    ignore_start: 400
    min_power: -45
    prom: 1.5
constants:
  air_slug_ul: 25
  reasp_ul: 12
  cart_disp_vel: 0.5
  skip_centrifuge_spin: true
  skip_centrifuge_shake: true
wells:
  S7:    {loc: 27, reagent: Hydrophilic, volume_ul: 170}
  M5:    {loc: 37, reagent: PBST, volume_ul: 280}
  SERUM: {loc: 18, reagent: Sample, volume_ul: 150}
  M11:   {loc: 43, reagent: Sample Buffer, volume_ul: 240}
  S1:    {loc: 21, reagent: Sample Buffer, volume_ul: 180}   # dilution stage 1 (1:10 of serum)
  S2:    {loc: 22, reagent: CRP CWP,       volume_ul: 180}   # dilution stage 2 (1:10 of S1, 1:100 overall)
  M12:   {loc: 44, reagent: Waste,         volume_ul: 0}     # discard for excess serum aspirate
  PP4:   {loc: 11, reagent: Cartridge,     volume_ul: 0}

phases:
  - name: A
    label: Centrifuge
    include: _common.yaml#centrifuge_phase
  - name: B
    label: Chip Dispenses
    steps:
      - type: tip_pick
        label: Pick Tip 1
        tip_id: 1
      - type: lld
        label: Pre-flight LLD
        threshold: 15
      - type: reagent_transfer
        label: cart_dispense_Hydrophilic
        source: S7
        target: PP4
        asp_vol: 130
        cart_vol: 70
        asp_speed: 20
        cart_vel: 0.5
        air_slug: 25
        reasp_ul: 12
        return_speed: 16.7
        stream: true
      - type: tip_swap
        label: Tip swap 1 -> 2
        from_id: 1
        to_id: 2
      - type: reagent_transfer
        label: cart_dispense_PBST_fast
        source: M5
        target: PP4
        asp_vol: 220
        cart_vol: 100
        asp_speed: 20
        cart_vel: 3.33
        air_slug: 25
        reasp_ul: 0
        skip_return: true
        hold_at_cart: true
        stream: true
      - type: reagent_transfer
        label: cart_dispense_PBST_slow
        source: M5
        target: PP4
        asp_vol: 0
        cart_vol: 90
        cart_vel: 0.5
        reasp_ul: 10
        return_speed: 33.3
        skip_aspirate: true
        tip_preload_ul: 145
        assume_at_cart: true
        stream: true
      - type: tip_swap
        label: Tip swap 2 -> 4
        from_id: 2
        to_id: 4
      - type: reagent_transfer
        label: cart_dispense_SampleBuffer_1
        source: M11
        target: PP4
        asp_vol: 90
        cart_vol: 60
        asp_speed: 20
        cart_vel: 0.5
        air_slug: 25
        reasp_ul: 0
        return_speed: 33.3
        stream: true
      - type: tip_swap
        label: Tip swap 4 -> 5
        from_id: 4
        to_id: 5
      - type: move_to_location
        label: Move to serum port
        well: SERUM
      - type: centrifuge_goto_serum
        label: Rotate to serum position
      - type: smart_aspirate
        label: Aspirate Sample from serum tube
        well: SERUM
        volume: 50
        speed: 20
        air_slug: 25
        piston_reset: true
        stream: true
      - type: home_z
        label: Home Z after serum aspirate
      - type: centrifuge_goto_pipette
        label: Rotate to pipette position

      # ---- Serial dilution stage 1: 50 uL serum -> 20 uL into S1, dump 30 uL to M12 waste ----
      - type: well_dispense
        label: Dispense 20 uL serum into S1 (Sample Buffer)
        well: S1
        volume: 20
        speed: 33.3
        blowout: false
      - type: well_dispense
        label: Dump 30 uL serum remainder to M12 waste
        well: M12
        volume: 30
        speed: 100.0
        blowout: true
      - type: tip_mix
        label: Mix S1 (diluted serum)
        well: S1
        mix_vol: 150
        speed: 100.0
        cycles: 4
        # Final mix cycle ends with 50 uL retained in the tip so the
        # next leg can dispense directly without a fresh LLF aspirate.
        pull_vol: 50

      # ---- Serial dilution stage 2: 20 uL from S1 -> S2, return 30 uL to S1 ----
      # Tip already holds 50 uL from the S1 mix (pull_vol above), so we
      # just dispense 20 uL to S2 and blow the 30 uL remainder back to S1.
      - type: well_dispense
        label: Dispense 20 uL S1 -> S2
        well: S2
        volume: 20
        speed: 33.3
        blowout: false
      - type: well_dispense
        label: Return 30 uL S1 remainder
        well: S1
        volume: 30
        speed: 33.3
        blowout: true

      - type: tip_mix
        label: Mix S2 (final diluted sample)
        well: S2
        mix_vol: 150
        speed: 100.0
        cycles: 4
        # Final mix cycle leaves 80 uL in the tip (60 uL cart + 20 uL
        # cushion).  The cart dispense below skips its own LLF aspirate.
        pull_vol: 80

      # ---- Cart dispense the diluted sample from S2 ----
      # skip_aspirate: tip already preloaded with 80 uL by the mix above.
      - type: reagent_transfer
        label: cart_dispense_DilutedSample
        source: S2
        target: PP4
        asp_vol: 80
        cart_vol: 60
        asp_speed: 20
        cart_vel: 0.25
        air_slug: 25
        reasp_ul: 12
        return_speed: 33.3
        stream: true
        skip_aspirate: true
      - type: tip_swap
        label: Tip swap 5 -> 8
        from_id: 5
        to_id: 8
      - type: reagent_transfer
        label: cart_dispense_SampleBuffer_2
        source: M11
        target: PP4
        asp_vol: 90
        cart_vol: 60
        asp_speed: 20
        cart_vel: 0.5
        air_slug: 25
        reasp_ul: 0
        return_speed: 33.3
        stream: true
      - type: timing_marker
        label: Analysis_Trigger_Post_SampleBuffer2
        event_type: start
        trigger_analysis: true
      - type: timing_marker
        label: Analysis_Trigger_Post_SampleBuffer2
        event_type: stop
      - type: tip_return
        label: Return Tip 8
        tip_id: 8
      - type: home_close
        label: Home all + close lid
  - name: C
    label: Lock
    include: _common.yaml#lock_phase
