name: CRP Ultra Latest
description: >
  HS CRP chip-dispense protocol, 1:1 mapped to
  CRP_protocol_32C.csv. Centrifuge phase runs
  (unlock / rotate / lift / pipette-goto) with
  spin and shake skipped. 6 reagent dispenses on
  cartridge port A: Hydrophilic, DI water, PBST
  (120 s chip warm wait + 2-stage fast/slow), Sample
  Buffer #1, Sample, Sample Buffer #2. One tip per
  reagent, pre-flight LLD, analysis trigger after
  the final dispense, then lock. Air slug 25 uL,
  aspirate 20 uL/s, chip temp 32 C.

reader:
  acq_mode: continuous
  acq_time_total_s: 20000
  acq_time_step_s: 4

peak_detect:
  fit_type: detect_peaks
  stitch_th: 1.15
  config_fit:
    dist: 100
    ignore_start: 400
    min_power: -45
    prom: 1.5

constants:
  air_slug_ul: 25
  reasp_ul: 12
  cart_disp_vel: 0.5
  skip_centrifuge_spin: true
  skip_centrifuge_shake: true

wells:
  # Reagent source wells (CSV A1..E1 map to ultra S/M slots)
  S7: {loc: 27, reagent: Hydrophilic,   volume_ul: 110}  # CSV A1
  M3: {loc: 35, reagent: DI Water,      volume_ul: 200}  # CSV B1
  M5: {loc: 37, reagent: PBST,          volume_ul: 220}  # CSV C1
  S9: {loc: 29, reagent: Sample Buffer, volume_ul: 180}  # CSV D1
  M9: {loc: 41, reagent: Samples,       volume_ul: 80}   # CSV E1

  # Cartridge target
  PP4: {loc: 11, reagent: Cartridge, volume_ul: 0}

phases:
  - name: A
    label: Centrifuge
    include: _common.yaml#centrifuge_phase

  - name: B
    label: Chip Dispenses
    steps:

      - type: lid
        label: Open lid
        open: true

      - type: tip_pick
        label: Pick Tip 1
        tip_id: 1

      - type: lld
        label: Pre-flight LLD
        threshold: 15

      # --- Hydrophilic coating (S7, CSV A1) ---
      # CSV rows 1-5: air 25 @ 20 uL/s, asp 110 @ 20,
      # cart 70 @ 0.5, reasp 12 @ 0.5, 5 s post-delay,
      # empty 77 @ 16.7.
      - type: reagent_transfer
        label: cart_dispense_Hydrophilic
        source: S7
        target: PP4
        asp_vol: 110
        cart_vol: 70
        asp_speed: 20.0
        cart_vel: 0.5
        air_slug: 25
        reasp_ul: 12
        return_speed: 16.7
        stream: true

      - type: delay
        label: Post-Hydrophilic wait
        seconds: 5

      - type: tip_swap
        label: Tip swap 1 -> 2
        from_id: 1
        to_id: 2

      # --- DI Water (M3, CSV B1) ---
      # CSV rows 6-10: air 25 @ 20, asp 190 @ 20,
      # cart 160 @ 1.5, reasp 12 @ 0.5, 5 s post-delay,
      # empty 67 @ 16.7. Firmware shares one velocity
      # for cart+reasp, so reasp runs at 1.5 here.
      - type: reagent_transfer
        label: cart_dispense_DI_Water
        source: M3
        target: PP4
        asp_vol: 190
        cart_vol: 160
        asp_speed: 20.0
        cart_vel: 1.5
        air_slug: 25
        reasp_ul: 12
        return_speed: 16.7
        stream: true

      - type: delay
        label: Post-DI_Water wait
        seconds: 5

      - type: tip_swap
        label: Tip swap 2 -> 3
        from_id: 2
        to_id: 3

      # --- PBST (M5, CSV C1), 2-stage with 120 s chip warm wait ---
      # CSV row 11 "Air draw and chip warm wait": 120 s.
      - type: delay
        label: PBST chip warm wait
        seconds: 120

      # CSV rows 12-13: air 25 @ 20, asp 200 @ 20,
      # fast cart 100 @ 3.33 (200 uL/min), skip return.
      # hold_at_cart keeps Z at the cartridge port so the
      # slow leg can fire back-to-back without a Z round-trip.
      - type: reagent_transfer
        label: cart_dispense_PBST_fast
        source: M5
        target: PP4
        asp_vol: 200
        cart_vol: 100
        asp_speed: 20.0
        cart_vel: 3.33
        air_slug: 25
        reasp_ul: 0
        skip_return: true
        hold_at_cart: true
        stream: true

      # CSV rows 14-15: slow cart 90 @ 0.5, reasp 10 @ 0.5.
      # Row 16: empty 45 @ 33.3 (handled by return_speed).
      # Tip preload = asp+air-cart_stage1 = 200+25-100 = 125 uL.
      # assume_at_cart skips the XY move and Z descent since
      # the fast leg left the tip already at the cart port.
      - type: reagent_transfer
        label: cart_dispense_PBST_slow
        source: M5
        target: PP4
        asp_vol: 0
        cart_vol: 90
        cart_vel: 0.5
        reasp_ul: 10
        return_speed: 33.3
        skip_aspirate: true
        tip_preload_ul: 125
        assume_at_cart: true
        stream: true

      - type: delay
        label: Post-PBST wait
        seconds: 1

      - type: tip_swap
        label: Tip swap 3 -> 4
        from_id: 3
        to_id: 4

      # --- Sample Buffer #1 (S9, CSV D1) ---
      # CSV rows 17-20: air 25 @ 20, asp 70 @ 20,
      # cart 60 @ 0.5, no reasp, empty 35 @ 33.3.
      - type: reagent_transfer
        label: cart_dispense_SampleBuffer_1
        source: S9
        target: PP4
        asp_vol: 70
        cart_vol: 60
        asp_speed: 20.0
        cart_vel: 0.5
        air_slug: 25
        reasp_ul: 0
        return_speed: 33.3
        stream: true

      - type: tip_swap
        label: Tip swap 4 -> 5
        from_id: 4
        to_id: 5

      # --- Sample (M9, CSV E1) ---
      # CSV rows 21-24: air 25 @ 20, asp 70 @ 20,
      # cart 60 @ 0.25 (15 uL/min), no reasp,
      # empty 35 @ 33.3.
      - type: reagent_transfer
        label: cart_dispense_Sample
        source: M9
        target: PP4
        asp_vol: 70
        cart_vol: 60
        asp_speed: 20.0
        cart_vel: 0.25
        air_slug: 25
        reasp_ul: 0
        return_speed: 33.3
        stream: true

      - type: tip_swap
        label: Tip swap 5 -> 6
        from_id: 5
        to_id: 6

      # --- Sample Buffer #2 (S9, CSV D1) --- identical to #1.
      # CSV rows 25-28.
      - type: reagent_transfer
        label: cart_dispense_SampleBuffer_2
        source: S9
        target: PP4
        asp_vol: 70
        cart_vol: 60
        asp_speed: 20.0
        cart_vel: 0.5
        air_slug: 25
        reasp_ul: 0
        return_speed: 33.3
        stream: true

      - type: timing_marker
        label: Analysis_Trigger_Post_SampleBuffer2
        event_type: start
        trigger_analysis: true

      - type: timing_marker
        label: Analysis_Trigger_Post_SampleBuffer2
        event_type: stop

      - type: tip_return
        label: Return Tip 6
        tip_id: 6

      - type: home_close
        label: Home all + close lid

  - name: C
    label: Lock
    include: _common.yaml#lock_phase
