name: Quick Demo
description: >
  Hardware validation protocol exercising every major
  subsystem in ~5 minutes. Includes centrifuge, serum
  pickup with dilution, reagent transfers to chip, and
  well-to-well transfer.

reader:
  acq_mode: continuous
  acq_time_total_s: 20000
  acq_time_step_s: 4

peak_detect:
  fit_type: detect_peaks
  stitch_th: 1.15
  config_fit:
    dist: 100
    ignore_start: 400
    min_power: -45
    prom: 1.5

constants:
  air_slug_ul: 40
  reasp_ul: 12
  cart_disp_vel: 1.5

wells:
  S5:    {loc: 25, reagent: DemoReagent1, volume_ul: 80}
  S6:    {loc: 26, reagent: DilutionBuf, volume_ul: 180}
  M2:    {loc: 34, reagent: Waste, volume_ul: 0}
  M6:    {loc: 38, reagent: DemoReagent2, volume_ul: 100}
  M3:    {loc: 35, reagent: DemoTransferSrc, volume_ul: 80}
  M4:    {loc: 36, reagent: SerumDilution, volume_ul: 0}
  M5:    {loc: 37, reagent: DemoTransferDst, volume_ul: 0}
  SERUM: {loc: 18, reagent: Serum, volume_ul: 50}
  PP4:   {loc: 11, reagent: Cartridge, volume_ul: 0}

phases:
  - name: A
    label: Centrifuge
    include: _common.yaml#centrifuge_phase

  - name: B
    label: Quick Pipetting
    steps:
      - type: set_loc_offset
        label: Apply gantry offset

      - type: lid
        label: Open lid
        open: true

      # --- Serum preparation (Tips 1-3) ---

      - type: tip_pick
        label: Pick Tip 1
        tip_id: 1

      # Dilution: S6 -> M4, 180 uL
      - type: dilution_transfer
        label: Dilution (S6 -> M4)
        source: S6
        dest: M4
        volume: 180
        asp_speed: 80.0

      - type: tip_swap
        label: Tip swap 1 -> 2
        from_id: 1
        to_id: 2

      # Move gantry to serum port before rotation
      - type: move_to_location
        label: Move to serum port
        well: SERUM

      - type: centrifuge_goto_serum
        label: Rotate to serum position

      # Aspirate 50 uL serum from serum port
      - type: smart_aspirate
        label: Aspirate serum
        well: SERUM
        volume: 50
        speed: 75.0
        air_slug: 50
        piston_reset: true

      - type: home_z
        label: Home Z after serum aspirate

      - type: centrifuge_goto_pipette
        label: Rotate to pipette position

      # Dispense 40 uL serum to M4 (no blowout)
      - type: well_dispense
        label: Dispense serum to M4
        well: M4
        volume: 40
        speed: 20.0
        blowout: false

      # Dispense 10 uL waste to M2
      - type: well_dispense
        label: Waste to M2
        well: M2
        volume: 10
        speed: 100.0
        blowout: true

      - type: tip_swap
        label: Tip swap 2 -> 3
        from_id: 2
        to_id: 3

      - type: tip_mix
        label: Mix M4 (serum dilution)
        well: M4
        mix_vol: 150
        speed: 100.0
        cycles: 6

      - type: tip_return
        label: Return Tip 3
        tip_id: 3

      # --- Main reagent transfers (Tips 4-5) ---

      - type: tip_pick
        label: Pick Tip 4
        tip_id: 4

      - type: lld
        label: Pre-flight LLD
        threshold: 20

      # Cart dispense serum dilution from M4
      - type: reagent_transfer
        label: SerumDilution
        source: M4
        target: PP4
        asp_vol: 180
        cart_vol: 150
        asp_speed: 40.0
        cart_vel: 10
        air_slug: 40
        reasp_ul: 12
        return_speed: 100.0

      - type: reagent_transfer
        label: DemoReagent1
        source: S5
        target: PP4
        asp_vol: 80
        cart_vol: 50
        asp_speed: 40.0
        cart_vel: 10
        air_slug: 40
        reasp_ul: 12
        return_speed: 100.0

      - type: tip_swap
        label: Swap 4 -> 5
        from_id: 4
        to_id: 5

      - type: reagent_transfer
        label: DemoReagent2
        source: M6
        target: PP4
        asp_vol: 100
        cart_vol: 60
        asp_speed: 40.0
        cart_vel: 10
        air_slug: 40
        reasp_ul: 12
        return_speed: 100.0

      - type: well_transfer
        label: DemoTransfer
        source: M3
        dest: M5
        volume: 80

      - type: tip_return
        label: Return Tip 5
        tip_id: 5

      - type: home_close
        label: Home all + close lid

  - name: C
    label: Lock cartridge
    include: _common.yaml#lock_phase
