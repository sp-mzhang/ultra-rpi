name: Quick Demo
description: >
  Short analysis-pipeline test (~3 min). Dispenses two
  reagents to chip with timing markers, then triggers
  local concentration analysis. Uses quick_demo/v1.0
  calibration data with synthetic 4PL fit parameters.

reader:
  acq_mode: continuous
  acq_time_total_s: 20000
  acq_time_step_s: 4

peak_detect:
  fit_type: detect_peaks
  stitch_th: 1.15
  config_fit:
    dist: 100
    ignore_start: 400
    min_power: -45
    prom: 1.5

constants:
  air_slug_ul: 40
  reasp_ul: 12
  cart_disp_vel: 1.5

wells:
  S5:    {loc: 25, reagent: DemoBuffer, volume_ul: 100}
  M6:    {loc: 38, reagent: DemoGNP, volume_ul: 100}
  M2:    {loc: 34, reagent: Waste, volume_ul: 0}
  PP4:   {loc: 11, reagent: Cartridge, volume_ul: 0}

phases:
  - name: A
    label: Demo Reagent Dispensing
    steps:
      - type: set_loc_offset
        label: Apply gantry offset

      - type: lid
        label: Open lid
        open: true

      - type: tip_pick
        label: Pick Tip 1
        tip_id: 1

      - type: lld
        label: Pre-flight LLD
        threshold: 20

      # Buffer wash
      - type: reagent_transfer
        label: cart_dispense_Buffer
        source: S5
        target: PP4
        asp_vol: 100
        cart_vol: 60
        asp_speed: 40.0
        cart_vel: 1.5
        air_slug: 40
        reasp_ul: 12
        return_speed: 100.0

      - type: tip_swap
        label: Swap 1 -> 2
        from_id: 1
        to_id: 2

      # GNP-equivalent: the step the fitting sheet analyses
      - type: reagent_transfer
        label: cart_dispense_GNP
        source: M6
        target: PP4
        asp_vol: 100
        cart_vol: 60
        asp_speed: 40.0
        cart_vel: 1.5
        air_slug: 40
        reasp_ul: 12
        return_speed: 100.0

      # Trigger analysis after GNP dispense
      - type: timing_marker
        label: Analysis_Trigger_Post_SA-GNP
        event_type: start
        trigger_analysis: true

      - type: timing_marker
        label: Analysis_Trigger_Post_SA-GNP
        event_type: stop

      - type: tip_return
        label: Return Tip 2
        tip_id: 2

      - type: home_close
        label: Home all + close lid

  - name: B
    label: Lock cartridge
    include: _common.yaml#lock_phase
