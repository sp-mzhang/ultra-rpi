# device_sn: use the real hardware UID in production (S3 key machines/{device_sn}/).
device_sn: DEV-1e10e696-cfec-4e5c-ac06-b2951a20aa8a
station_id: 100
machine_name: Ultra 3
protocol_mode: ultra

stm32:
  port: /dev/ttyAMA3
  baud: 921600
  timeout_s: 5.0

reader:
  port: auto
  dollop_name: reader7
  # Number of consecutive "No TLV data captured" blocks
  # that trigger a hard reconnect of the PProc reader
  # (stop_stream -> disconnect -> reopen). The PProc
  # occasionally gets into a state where it still ACKs the
  # "start" command but emits no bytes; re-opening the
  # CDC-ACM device is the only reliable recovery.
  # Set to 0 to disable auto-recovery.
  recover_after_empty_blocks: 3

# Gantry motion defaults (override firmware constants).
# Each field can also be overridden per-step in a recipe by
# setting the same key (e.g. ``pick_depth_mm: -24.0``) on a
# ``tip_pick`` / ``tip_swap`` / ``tip_return`` step.
gantry:
  # Per-axis cruise speeds applied to every move the Pi issues
  # (``move_gantry``, ``move_to_location``, ``move_z_axis``) when
  # the caller does not pass an explicit ``speed`` / ``z_speed``
  # field. Values are in mm/s.
  #
  # Firmware also carries its own axis defaults
  # (``cfg->default_speed_sps`` in ``STM32CubeIDE/Drivers/gantry_hw.h``)
  # and enforces a Z ceiling (``GANTRY_Z_MAX_SPS`` = 18 mm/s). A Z
  # value above 18 mm/s here will be silently clamped by the firmware.
  #
  # XY is a coordinated move so the firmware carries one speed on
  # the wire; when x_speed_mms and y_speed_mms differ, the smaller
  # of the two is sent so neither axis is over-driven.
  #
  # Set any value to 0 to fall back to the firmware axis default.
  motion:
    # Operational defaults: 50 mm/s XY, 10 mm/s Z. Firmware can
    # sustain higher XY (flat-torque ceiling is ~300 mm/s) -- raise
    # once 50 mm/s is validated. Z keeps ~44% headroom under the
    # firmware ceiling (GANTRY_Z_MAX_SPS = 18 mm/s).
    x_speed_mms: 50.0
    y_speed_mms: 50.0
    z_speed_mms: 10.0

  tip_swap:
    # Absolute gantry Z target during tip pickup, in mm from
    # home (negative = down). Firmware default: -22.0 mm.
    pick_depth_mm: -23.0
    # Upward retract after pickup, in mm.
    # Firmware default: 2.0 mm.
    retract_mm: 2.0
    # +X seat offset from slot centre during eject, in mm.
    # Firmware default: 7.5 mm.
    x_eject_mm: 7.5
    # XY cruise speed during tip swap, in mm/s.
    # Bumped to operational default; firmware default also 50 mm/s.
    xy_speed_mms: 50.0
    # Z cruise speed during tip swap, in mm/s.
    # ~44% headroom under firmware ceiling (GANTRY_Z_MAX_SPS = 18 mm/s).
    z_speed_mms: 10.0

# Liquid-handling defaults (override firmware constants).
# Each field can also be overridden per-step in a recipe by
# setting the same key on a smart_aspirate / reagent_transfer
# step (e.g. ``foil_pierce_mm: 3.0``).
liquid:
  foil_puncture:
    # Z pierce-stroke depth relative to foil-contact Z, in mm.
    # Applied after the first pLLD pass when foil_detect=True.
    # Firmware default: 2.0 mm (FOIL_PIERCE_MM).
    pierce_mm: 1.0
    # Z speed during the pierce stroke, in steps/s.
    # Firmware default: 2000 sps (FOIL_PIERCE_SPEED_SPS).
    pierce_speed_sps: 2000
  cartridge_dispense:
    # Offset applied to the pre-flight LLD-detected cartridge Z
    # before it becomes the dispense height. Positive values
    # move the tip toward Z home (i.e. less negative / up) so
    # the tip sits slightly above the detected port surface
    # during every cart_dispense. Set to 0.0 to dispense at
    # the detected surface itself.
    # Can be overridden per-recipe via
    # ``constants.cartridge_lld_offset_mm`` or per-step on the
    # ``lld`` step via ``offset_mm``.
    lld_offset_mm: 0.5

# Per-unit calibration (editable in full machine_settings.yaml on S3).
calibration:
  loc_offset_x_um: 0
  loc_offset_y_um: 0
  loc_offset_z_um: 0
  angle_open_initial_deg: 290
  default_cartridge_z_mm: -23.8

# Acquisition and peak_detect live in each protocol recipe YAML.

protocol:
  default_recipe: crp_ultra_demo

camera:
  device: /dev/video0
  # Explicit capture format. Default UVC mode on most webcams is
  # 640x480 YUYV which gives ~2-3 px per DataMatrix module at the
  # carousel-probe pose -- too little for libdmtx to lock a
  # region. 1280x720 MJPEG roughly doubles the pixels per module
  # without slowing the USB pipe down. Set ``fourcc: null`` to
  # leave whatever the driver negotiates.
  width: 1280
  height: 720
  fourcc: MJPG

gui:
  host: 0.0.0.0
  port: 8080

iot:
  endpoint: av6fq1kv2yjq0-ats.iot.us-east-1.amazonaws.com
  cert_dir: /etc/ultra/certs/
  template: ultrathink-fleet-template
  claim_cert_dir: /etc/ultra/certs/
  credentials_dir: /etc/ultra/certs/device/

logging:
  # Global rotating log file for the ultra-rpi process.  Named
  # ``sway.log`` for compatibility with span / dollop / analysis
  # tools that look for ``sway.log`` inside each run dir.  At run
  # finalize the byte range written during that run is snapshotted
  # into ``{run_dir}/sway.log`` (see RunGroupWriter.export_sway_log).
  # Rotating: 10 MB per file, 5 backups kept.
  log_dir: ~/sway_logs
  log_file: sway.log

egress:
  enabled: true
  data_dir: ~/sway_runs
  db_path: ~/sway_runs/ultra-egress.db
  s3_bucket: siphox-home
  s3_region: us-east-2
  zip_temp_dir: /tmp/ultra-egress
  # Cap S3 upload throughput in bytes/sec (null = unlimited).
  # Example: 524288 = 512 KiB/s, 1048576 = 1 MiB/s.
  s3_max_bandwidth_bps: null
  dollop_host: 18.117.187.46
  dollop_port: 8080
  loop_sleep_s: 10.0
  cleanup_after_egress: false

analysis:
  default_assay: crp
  default_calibration_version: v1.0

startup:
  auto_state_machine: false
  skip_nfc: false
  skip_qr: true
  default_chip_id: L007W01R01C01
  restart_delay_s: 5
  self_check_stub_s: 5.0

quick_run:
  enabled: true
  operator: ultra_rpi
  protocol: ultra
  chip_id: L007W01R01C01

# ---------------------------------------------------------------
# Carousel alignment via the toolhead camera.
# Used by the "Align Carousel to Blister" button in the Engineering
# Camera tab (POST /api/camera/align-carousel-to-blister).
#
# Calibration basis (user-measured):
#   carousel at blister pose       -> markers avg = -90 deg
#   carousel +49 deg CW  of blister -> markers avg = -41 deg
#   carousel -30 deg CCW of blister -> markers avg = -128 deg
# Slope is +1 (marker angle tracks carousel CW rotation 1:1), so
# the reference for the blister side is -90 deg.
# ---------------------------------------------------------------
carousel_align:
  home_z_first: true             # home Z before the XY move
  probe_pose:
    x_mm: 0.0
    y_mm: 70.0
    z_mm: 0.0
    xy_speed_mms: 40.0
    z_speed_mms: 10.0
  led_settle_ms: 250             # wait after LED on before capture
  min_markers: 1               # refuse alignment below this count
  # Per libdmtx call. With tile_decode on, each tile gets its own
  # fresh budget and a much smaller search space, so 500 ms/tile
  # is plenty. When tile_decode is off, bump this to ~1500 ms to
  # match probe_markers_stream.sh. Total wall time is roughly
  #   decode_timeout_ms * tile_rows * tile_cols * (CLAHE ? 2 : 1)
  # when libdmtx has to time out on a tile. In practice tiles with
  # a marker finish almost instantly; only empty tiles cost the
  # full budget.
  decode_timeout_ms: 500
  use_clahe_fallback: true
  # Tile decoding: slice the frame into rows x cols with overlap
  # and run libdmtx on each tile independently. Rescues markers
  # the single-pass scanner misses once it locks onto the first
  # candidate (common with multiple markers per frame).
  tile_decode: true
  tile_rows: 3
  tile_cols: 3
  tile_overlap_px: 60            # >= largest expected marker /2
  # CLAHE preprocessing for the enhanced pass. Finer tile grid +
  # lower clip limit gives per-marker local contrast without
  # amplifying the printed crosshair pattern into false L-finder
  # candidates.
  clahe_clip_limit: 2.0
  clahe_tile_grid: 16
  # Adaptive-threshold preprocessing pass. Binarises the frame so
  # the printed "+" crosshairs become smooth blobs (rejected fast
  # by libdmtx's L-finder) and the real DataMatrix cells become
  # crisp squares. Biggest single rescue for small markers on a
  # cross-hatched background; costs ~10 ms/tile.
  use_adaptive_threshold: true
  adaptive_block_size: 31        # must be odd, >= 3
  adaptive_c: 5
  adaptive_blur_ksize: 3         # Gaussian pre-blur kernel
  # libdmtx region-scanner hints. ``symbol_size: auto`` = the
  # library default (try every shape). edge_min_px / edge_max_px
  # cull trivially small/large candidate edges before the full
  # region decode, which is where most scanner time is wasted on
  # cross-hatched frames. Markers here are ~5--6 mm, ~50--72 px
  # on-camera, so bounds of 20..200 px pass real markers while
  # rejecting most false candidates.
  symbol_size: auto
  edge_min_px: 20
  edge_max_px: 200
  # edge_thresh / square_devn fall through to libdmtx defaults
  # unless an override is added here.
  sides:
    # ``station_offset_from_open_deg`` is the side-specific offset
    # from ``calibration.angle_open_initial_deg`` (see top of this
    # file). The absolute motor station angle is derived as
    #
    #   station_deg = (angle_open_initial_deg + offset) mod 360
    #
    # and the alignment endpoint then commands
    #
    #   target_motor = station_deg + delta
    #
    # where ``delta`` is the camera-measured correction. Because
    # the target anchors to the station (not to the current motor
    # angle), running Align twice in a row is idempotent.
    #
    # Offsets below mirror the firmware goto-station derivations:
    #   blister: open_initial - 270  (e.g. 290 -> 20)
    #   serum:   open_initial - 180  (e.g. 290 -> 110)
    #   pipette: open_initial -  90  (e.g. 290 -> 200)
    blister:
      markers: ['L', 'T', 'R', 'U']   # ACTIVE: decoded markers
                                      # feed the angle average.
      reference_deg: -90.0            # ACTIVE anchor.
      station_offset_from_open_deg: -270  # ACTIVE station.
    pipette:
      # The aligner is blister-anchored: every alignment snaps the
      # carousel to the blister pose. The fields below are kept for
      # schema compatibility and operator documentation only; they
      # are not read by CarouselAligner.
      # Payloads are stamped lowercase on the physical carousel.
      markers: ['s', 'i', 'o', 'x']
      reference_deg: 90.0
      station_offset_from_open_deg: -90
  centrifuge:
    move_rpm: 1
    polarity: -1                 # marker angle vs carousel CW slope
                                 # is +1 on this rig; motor drives
                                 # carousel CCW -> offset must be
                                 # applied with opposite sign.
