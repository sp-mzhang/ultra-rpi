stm32:
  port: /dev/ttyAMA3
  baud: 921600
  timeout_s: 5.0

reader:
  port: auto
  acq_time_total_s: 3600
  acq_time_step_s: 3

protocol:
  default_recipe: tsh_ultra

gui:
  host: 0.0.0.0
  port: 8080

iot:
  endpoint: ""
  cert_dir: /etc/ultra/certs/

egress:
  enabled: false
  device_sn: ultra-001
  data_dir: /home/ultra3/sway_runs
  db_path: ""
  s3_bucket: siphox-home
  s3_region: us-east-2
  zip_temp_dir: /tmp/ultra-egress
  dollop_host: ""
  dollop_port: 8080
  loop_sleep_s: 10.0

startup:
  auto_state_machine: false
  skip_nfc: false
  skip_qr: true
  default_chip_id: ULTRA-TEST-001
  self_check_stub_s: 5.0
